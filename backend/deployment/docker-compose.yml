version: '3.8'

services:
  skillswap-backend:
    build:
      context: ..
      dockerfile: deployment/Dockerfile
    container_name: skillswap_backend
    restart: always
    ports:
      - "4000:4000"
    environment:
      - NODE_ENV=production
      - PORT=4000
    env_file:
      - ../.env
    depends_on:
      - redis
    networks:
      - skillswap_network

  redis:
    image: redis:7-alpine
    container_name: skillswap_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - skillswap_network

  nginx:
    image: nginx:alpine
    container_name: skillswap_nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - skillswap_backend
    networks:
      - skillswap_network

volumes:
  redis_data:

networks:
  skillswap_network:
    driver: bridge
