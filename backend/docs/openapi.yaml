openapi: 3.0.3
info:
  title: SkillSwap API
  description: Production-ready peer-to-peer skill exchange platform backend.
  version: 1.0.0
servers:
  - url: http://localhost:4000
    description: Local development server
paths:
  /health:
    get:
      summary: Health check
      responses:
        '200':
          description: Server is running
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  message:
                    type: string

  /api/auth/register:
    post:
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
              properties:
                email:
                  type: string
                password:
                  type: string
                username:
                  type: string
      responses:
        '201':
          description: Registration successful

  /api/auth/login:
    post:
      summary: Login to account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
              properties:
                email:
                  type: string
                password:
                  type: string
                mfaCode:
                  type: string
      responses:
        '200':
          description: Login successful

  /api/profile:
    get:
      summary: Get own user profile
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Profile retrieved

  /api/skills:
    get:
      summary: Browse/filter available skills
      responses:
        '200':
          description: List of skills

  /api/matching:
    get:
      summary: Get user matches
      security:
        - BearerAuth: []
      responses:
        '200':
          description: List of matches

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
