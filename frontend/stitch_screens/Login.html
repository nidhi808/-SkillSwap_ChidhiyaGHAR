</div>
</div>
<!-- Password Field -->

<div class="flex justify-between items-center">
<label class="font-label-sm text-label-sm text-on-surface-variant uppercase tracking-widest" for="password">
                                Password

                                Forgot Password?
                            </a>
</div>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline-variant text-[20px]">
                                lock

</div>

<!-- Interactive Background Particles -->
<script>
        // Simple ambient particle micro-interaction
        document.addEventListener('mousemove', (e) => {
            const { clientX, clientY } = e;
            const x = (clientX / window.innerWidth - 0.5) * 20;
            const y = (clientY / window.innerHeight - 0.5) * 20;
            document.body.style.backgroundPosition = `${x}px ${y}px`;
        });
    </script>
